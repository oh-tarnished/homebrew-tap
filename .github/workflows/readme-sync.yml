name: README Sync

on:
  push:
    branches:
      - main
    paths:
      - 'Casks/**/*.rb'
      - 'scripts/update_readme.rb'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate README cask list
        run: ruby scripts/update_readme.rb

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'docs: sync README cask list'
          branch: bot/sync-readme-casks
          title: 'docs: sync README cask list'
          body: 'Automated README update for the current set of casks.'
          delete-branch: true
