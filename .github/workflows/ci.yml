name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  audit:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check README sync
        run: ruby scripts/update_readme.rb --check

      - name: Validate cask syntax
        run: ruby -c Casks/finfo.rb
